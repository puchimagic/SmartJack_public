<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SmartJack - サポート</title>
  <style>
    body{font-family:system-ui,-apple-system,Helvetica,Arial;margin:24px;color:#222}
    .page-tabs{display:flex;gap:8px;border-bottom:1px solid #e6e6e6;padding-bottom:12px;margin-bottom:16px}
    .tab{padding:8px 12px;text-decoration:none;color:#333;border-radius:8px}
    .tab.active{background:#0366d6;color:#fff}
    h1{font-size:24px}
    p{line-height:1.6}
    a{color:#0366d6}
  </style>
</head>
<body>
  <div id="site-header-placeholder"></div>

  <h1>SmartJack サポートページ</h1>
  <p>以下のリンクから利用規約・プライバシーポリシー・お問い合わせページへ移動できます。</p>

  <ul>
    <li><a href="terms.html">利用規約</a></li>
    <li><a href="privacy.html">プライバシーポリシー</a></li>
    <li><a href="support.html">お問い合わせ</a></li>
  </ul>

  <hr>
  <p>© 2026 PuchiMagic. All rights reserved.</p>
  
  <script>
    (function(){
      fetch('header.html').then(r=>r.text()).then(html=>{
        const placeholder = document.getElementById('site-header-placeholder');
        placeholder.innerHTML = html;
        const tabs = document.querySelectorAll('.top-tabs .tab');
        const path = location.pathname.split('/').pop() || 'index.html';
        tabs.forEach(a=>{ if(a.getAttribute('href')===path) a.classList.add('active'); });

        // Initialize hamburger menu behavior for injected header
        const btn = document.getElementById('menu-toggle');
        const nav = document.getElementById('nav-menu');
        if(btn && nav){
          btn.addEventListener('click', ()=>{
            const expanded = btn.getAttribute('aria-expanded') === 'true';
            btn.setAttribute('aria-expanded', String(!expanded));
            btn.setAttribute('aria-label', expanded ? 'メニューを開く' : 'メニューを閉じる');
            nav.classList.toggle('show');
          });
          document.addEventListener('click', (e)=>{
            if(nav.classList.contains('show')){
              const inside = nav.contains(e.target) || btn.contains(e.target);
              if(!inside){ nav.classList.remove('show'); btn.setAttribute('aria-expanded','false'); btn.setAttribute('aria-label','メニューを開く'); }
            }
          });
        }

          // make header sticky spacing: set body padding-top to header height
          (function(){
            const header = placeholder.querySelector('.site-header');
            function applyPadding(){
              if(header){
                document.body.style.paddingTop = header.offsetHeight + 'px';
              }
            }
            applyPadding();
            window.addEventListener('resize', applyPadding);
          })();

      }).catch(e=>console.error(e));
    })();
  </script>
</body>
</html>
