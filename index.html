<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>サンプルページ</title>
</head>

<body>
  <div class="hero-impge">
    <img src="img/IMG_3360.jpg" alt="アプリ紹介画像">
  </div>
  <div id="site-header-placeholder"></div>

  <main>
    <div class="download-container">
      <a href="" target="_bllank">
        <img src="img/IMG_3227.png" alt="ダウンロード" class="download-image">
      </a>
      <a href="" target="_blank">
        <img src="img/IMG_3228.png" alt="ダウンロード" class="download-image">
      </a>
    </div>
    <div class="card">
      <img src="img/横長.png" alt="サンプル画像">
      <div class="card-text">
        <h3>アプリの特徴</h3>
        <p>このアプリではスマート家電の操作を簡単に行えます。外出先からもワンタップで制御可能です。</p>
      </div>
    </div>
    <div class="card-gallery">
      <div class="gallery-card">
        <img src="img/スクリーンショット (40).png">
        <p>起きる前にエアコンON。<br>快適な起床を</p>
      </div>

      <div class="gallery-card">
        <img src="img/スクリーンショット (38).png">
        <p>カスタマイズできるボタン画面。<br>使いやすくアレンジしよう</p>
      </div>

      <div class="gallery-card">
        <img src="img/縦長.png" alt="サンプル3">
        <p>商品の簡単な説明文</p>
      </div>
    </div>
    <div class="home-card">
      <img src="img/縦長.png" alt="サンプル3">
      <p>はじめてでも直感的に使える</p>
    </div>
  </main>

  <div id="footer"></div>
  <hr>
  <p>© 2026 PuchiMagic. All rights reserved.</p>

  <script>
    (function(){
      // header を読み込み、ヘッダー高さ分の余白を body に追加
      fetch('header.html').then(r=>r.text()).then(html=>{
        const placeholder = document.getElementById('site-header-placeholder');
        placeholder.innerHTML = html;
        const tabs = document.querySelectorAll('.top-tabs .tab');
        const path = location.pathname.split('/').pop() || 'index.html';
        tabs.forEach(a=>{ if(a.getAttribute('href')===path) a.classList.add('active'); });

        const btn = document.getElementById('menu-toggle');
        const nav = document.getElementById('nav-menu');
        if(btn && nav){
          btn.addEventListener('click', ()=>{
            const expanded = btn.getAttribute('aria-expanded') === 'true';
            btn.setAttribute('aria-expanded', String(!expanded));
            btn.setAttribute('aria-label', expanded ? 'メニューを開く' : 'メニューを閉じる');
            nav.classList.toggle('show');
          });
          document.addEventListener('click', (e)=>{
            if(nav.classList.contains('show')){
              const inside = nav.contains(e.target) || btn.contains(e.target);
              if(!inside){ nav.classList.remove('show'); btn.setAttribute('aria-expanded','false'); btn.setAttribute('aria-label','メニューを開く'); }
            }
          });
        }

        (function(){
          const header = placeholder.querySelector('.site-header');
          function applyPadding(){ if(header){ document.body.style.paddingTop = header.offsetHeight + 'px'; } }
          applyPadding();
          window.addEventListener('resize', applyPadding);
        })();

      }).catch(e=>console.error(e));
      
      // ギャラリーの横スクロール変換
      const gallery = document.querySelector('.card-gallery');
      if (gallery) {
        gallery.addEventListener('wheel', (e) => {
          e.preventDefault();
          gallery.scrollLeft += e.deltaY;
        });
      }

    })();
  </script>
</body>

</html>
