<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>サンプルページ</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="hero-impge">
    <img src="img/IMG_3360.jpg" alt="アプリ紹介画像">
  </div>
  <div id="header"></div>

  <main>
    <div class="download-container">
      <a href="" target="_bllank">
        <img src="img/IMG_3227.png" alt="ダウンロード" class="download-image">
      </a>
      <a href="" target="_blank">
        <img src="img/IMG_3228.png" alt="ダウンロード" class="download-image">
      </a>
    </div>
    <div class="card">
      <img src="img/横長.png" alt="サンプル画像">
      <div class="card-text">
        <h3>アプリの特徴</h3>
        <p>このアプリではスマート家電の操作を簡単に行えます。外出先からもワンタップで制御可能です。</p>
      </div>
    </div>
    <div class="card-gallery">
      <div class="gallery-card">
        <img src="img/スクリーンショット (40).png">
        <p>起きる前にエアコンON。<br>快適な起床を</p>
      </div>

      <div class="gallery-card">
        <img src="img/スクリーンショット (38).png">
        <p>カスタマイズできるボタン画面。<br>使いやすくアレンジしよう</p>
      </div>

      <div class="gallery-card">
        <img src="img/縦長.png" alt="サンプル3">
        <p>商品の簡単な説明文</p>
      </div>
    </div>
    <div class="home-card">
      <img src="img/縦長.png" alt="サンプル3">
      <p>はじめてでも直感的に使える</p>
    </div>
  </main>

  <div id="footer"></div>

  <script>
    async function loadHTML(id, file) {
      try {
        const response = await fetch(file);
        if (!response.ok) throw new Error('読み込み失敗: ' + file);
        const html = await response.text();
        document.getElementById(id).innerHTML = html;
      } catch (err) {
        console.error(err);
      }
    }
    loadHTML('header', 'header.html');
    loadHTML('footer', 'footer.html');

    const gallery = document.querySelector('.card-gallery');
    if (gallery) {
      gallery.addEventListener('wheel', (e) => {
        e.preventDefault();
        gallery.scrollLeft += e.deltaY;
      });
    }
    gallery.addEventListener('wheel', (e) => {
      e.preventDefault(); // 縦スクロールを無効化
      gallery.scrollLeft += e.deltaY; // 縦の動きを横に変換
    });
  </script>
</body>

</html>
