<header class="site-header">
  <div class="container" style="display:flex;align-items:center;gap:16px;justify-content:space-between;">
    <div style="display:flex;align-items:center;gap:12px;">
      <a class="brand" href="index.html" style="display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit;padding:6px 0;">
        <img src="SMARTJACK.jpeg" alt="SmartJack" class="logo" style="width:48px;height:48px;object-fit:cover;border-radius:6px;">
        <strong class="brand-title" style="font-size:18px;">SmartJack</strong>
      </a>
    </div>
    <button id="menu-toggle" aria-expanded="false" aria-controls="nav-menu" aria-label="メニューを開く" class="menu-toggle">☰</button>
    <nav id="nav-menu" class="top-tabs" style="margin-left:12px;">
      <a class="tab" href="index.html">トップ</a>
      <a class="tab" href="terms.html">利用規約</a>
      <a class="tab" href="privacy.html">プライバシー</a>
      <a class="tab" href="support.html">お問い合わせ</a>
    </nav>
  </div>
</header>
<style>
  .site-header{position:fixed;top:0;left:0;right:0;background:#fff;z-index:4000;box-shadow:none}
  .site-header .container{height:64px;display:flex;align-items:center;border-bottom:1px solid #e6e6e6}
  .top-tabs{display:flex;gap:8px;align-items:center;height:100%;margin-left:0}
  .tab{padding:0 14px;text-decoration:none;color:#333;border-radius:6px;display:flex;align-items:center;height:auto;line-height:1.2}
  .tab:hover{background:rgba(3,102,214,0.06)}
  .tab.active{background:#0366d6;color:#fff;box-shadow:none}
  .logo{display:block}
  .menu-toggle{display:none;background:transparent;border:0;font-size:22px;line-height:1;padding:8px;cursor:pointer}
  /* Small screens: slide-in side panel */
  @media (max-width:600px){
    .top-tabs{display:flex;gap:8px;align-items:flex-start;flex-direction:column;position:fixed;top:64px;left:0;height:calc(100% - 64px);width:260px;background:#fff;padding:16px 8px;transform:translateX(-100%);transition:transform .28s ease;z-index:2000}
    .top-tabs.show{transform:translateX(0)}
    .top-tabs .tab{display:block;padding:8px 12px;height:auto;border-radius:6px}
    .menu-toggle{display:block;z-index:3000}
    .brand-title{display:inline-block;font-size:14px;margin-left:4px}
    .site-header .container .logo{width:36px;height:36px}
    .site-header .container{position:relative}
    .nav-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.32);opacity:0;transition:opacity .28s;z-index:1500;pointer-events:none}
    .nav-backdrop.show{opacity:1;pointer-events:auto}
  }
</style>
<script>
  (function(){
    const btn = document.getElementById('menu-toggle');
    const nav = document.getElementById('nav-menu');
    // create backdrop element
    let backdrop = document.getElementById('nav-backdrop');
    if(!backdrop){ backdrop = document.createElement('div'); backdrop.id = 'nav-backdrop'; document.body.appendChild(backdrop); }

    function openNav(){
      nav.classList.add('show');
      backdrop.classList.add('show');
      btn.setAttribute('aria-expanded','true');
      btn.setAttribute('aria-label','メニューを閉じる');
    }
    function closeNav(){
      nav.classList.remove('show');
      backdrop.classList.remove('show');
      btn.setAttribute('aria-expanded','false');
      btn.setAttribute('aria-label','メニューを開く');
    }

    if(btn && nav){
      btn.addEventListener('click', ()=>{ nav.classList.contains('show') ? closeNav() : openNav(); });
      backdrop.addEventListener('click', ()=>{ closeNav(); });
      // close on Escape
      document.addEventListener('keydown', (e)=>{ if(e.key==='Escape') closeNav(); });
    }
  })();
</script>
