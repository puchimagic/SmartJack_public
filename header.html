<style>
/* 以下は style.css から移設したスタイル */
/* ベース設定 */
body {
  margin: 0;
  font-family: "Noto Sans JP", sans-serif;
  background-color: #fafafa;
  color: #222;
  line-height: 1.7;
}

main {
  width: 100%;
  padding: 2rem 2rem;
  padding-top: 120px;
  box-sizing: border-box;
}

section {
  max-width: 900px;
  margin: 0 auto 4rem;
}

/* 見出し調整 */
h1,
h2,
h3 {
  color: #111;
  line-height: 1.4;
}

h1 {
  font-size: 2.4rem;
  margin-bottom: 1.5rem;
}

h2 {
  font-size: 1.8rem;
  border-bottom: 2px solid #e5e5e5;
  padding-bottom: 0.3rem;
  margin-top: 3rem;
}

.feature {
  display: flex;
  align-items: center;
  gap: 2rem;
}

.feature img {
  width: 300px;
  height: auto;
  border-radius: 12px;
}

/* スマホ対応 */
@media (max-width: 768px) {
  main {
    padding: 1rem;
  }

  .feature {
    flex-direction: column;
    text-align: center;
  }

  .feature img {
    width: 90%;
  }
}

.header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: transparent;
  color: #fff;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.5rem 0.2rem;
  box-sizing: border-box;
  z-index: 10;
}

  .hero-impge {
    width: 100%;
    height: 400px;
    /* スマホの高さ */
    overflow: hidden;
    /* 切り抜く用 */
  }

  .hero-impge img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    /* 必須！ */
    object-position: center;
    display: block;
  }

  @media screen and (min-width: 768px) {
    .hero-impge {
      height: 600px;
      /* PCで薄く */
    }
  }

/* 画像、ヘッダーの下 */
/* スマホ（デフォルト） */

.logo img {
  height: 90px;
  /* 好みに合わせて調整 */
  width: auto;
  display: block;
}

/*メニュー初期状態*/
.menu {
  display: none;
  position: absolute;
  top: 100%;
  right: 0;
  background: rgba(255, 255, 255, 0.8);
  width: 100vw;
  text-align: center;
  padding: 1rem 0.2rem;
  box-sizing: border-box;
}

.menu ul {
  list-style: none;
  margin: 0;
  padding: 0;
}

.menu li {
  margin: 0.5rem 0;
}

.menu a {
  color: #454343;
  text-shadow:
    1px 1px 0 #fff,
    -1px 1px 0 #fff,
    1px -1px 0 #fff,
    -1px -1px 0 #fff;
  text-decoration: none;
}

/*ハンバーガーボタン*/
.menu-icon {
  font-size: 1.8rem;
  cursor: pointer;
  user-select: none;
}

.menu-toggle {
}

/* チェックが入ったらメニューを表示 */
.menu-toggle:checked+.menu-icon+.menu {
  display: block;
}

/*PC*/
@media screen and (min-width: 768px) {

  .menu {
    display: block;
    position: static;
    width: auto;
    background: transparent;
  }

  .top-tabs { margin-left: 12px; }
  /* Desktop: タブをヘッダーの高さに合わせて縦中央揃え */
  .top-tabs .tab {
    height: 64px;
    display: flex;
    align-items: center;
    padding-top: 0;
    padding-bottom: 0;
  }

  .menu ul {
    display: flex;
    gap: 1.5rem;
  }

  .menu-toggle,
  .menu-icon {
    display: none;
  }

  .menu-toggle:checked+.menu-icon+.menu a:hover {
    color: #00ffff;
    transition: 0.3s;
  }
}

}

  }

  .download-image {

/* 横スクロールカード */

}

.card-gallery::-webkit-scrollbar {

.gallery-card img {

@media (min-width: 1100px) {

  }
}



/*Q&A*/
#faq {
  max-width: 700px;
  margin: 0 auto;
}

#faq h2 {

  text-align: center;
  margin-bottom: 1em;
  color: #4b4b4b;
}

.faq-item {

}

.faq-question {
  width: 100%;

  background: #fff;
  border: none;

.faq-question:hover {

.faq-question::after {

}

.faq-item.active .faq-question::after {

}
.faq-item.active .faq-answer {
  display: block;
}
</style>
<script>
  (function(){
    const btn = document.getElementById('menu-toggle');
    const nav = document.getElementById('nav-menu');
    // create backdrop element
    let backdrop = document.getElementById('nav-backdrop');
    if(!backdrop){ backdrop = document.createElement('div'); backdrop.id = 'nav-backdrop'; document.body.appendChild(backdrop); }

    function openNav(){
      nav.classList.add('show');
      backdrop.classList.add('show');
      btn.setAttribute('aria-expanded','true');
      btn.setAttribute('aria-label','メニューを閉じる');
    }
    function closeNav(){
      nav.classList.remove('show');
      backdrop.classList.remove('show');
      btn.setAttribute('aria-expanded','false');
      btn.setAttribute('aria-label','メニューを開く');
    }

    if(btn && nav){
      btn.addEventListener('click', ()=>{ nav.classList.contains('show') ? closeNav() : openNav(); });
      backdrop.addEventListener('click', ()=>{ closeNav(); });
      // close on Escape
      document.addEventListener('keydown', (e)=>{ if(e.key==='Escape') closeNav(); });
    }
  })();
</script>
